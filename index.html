<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <header class="header">
          <div>
            <h1>Snake</h1>
            <p class="meta">Score: <span data-score>0</span></p>
            <p class="meta">High score: <span data-high-score>0</span></p>
            <p class="meta" data-room-label>Global leaderboard</p>
          </div>
          <p class="meta" data-status>Running</p>
        </header>

        <section class="toolbar" aria-label="Game options">
          <label class="field">
            <span>Snake skin</span>
            <select data-skin>
              <option value="classic">Classic</option>
              <option value="ocean">Ocean</option>
              <option value="sunset">Sunset</option>
            </select>
          </label>
          <label class="field">
            <span>Grid size</span>
            <select data-grid-size>
              <option value="12">Small 12 x 12</option>
              <option value="16" selected>Medium 16 x 16</option>
              <option value="20">Large 20 x 20</option>
            </select>
          </label>
          <label class="field">
            <span>Name</span>
            <input type="text" maxlength="12" data-player-name value="Player" />
          </label>
        </section>

        <div class="board" data-board aria-label="Snake game board"></div>

        <div class="actions">
          <button type="button" data-pause>Pause</button>
          <button type="button" data-restart>Restart</button>
          <button type="button" data-invite>Invite friends for battle</button>
        </div>

        <div class="controls" aria-label="On-screen controls">
          <button type="button" data-direction="UP">Up</button>
          <div class="controls-row">
            <button type="button" data-direction="LEFT">Left</button>
            <button type="button" data-direction="DOWN">Down</button>
            <button type="button" data-direction="RIGHT">Right</button>
          </div>
        </div>

        <section class="leaderboard" aria-label="Leaderboard">
          <div class="leaderboard-header">
            <h2>Leaderboard</h2>
            <button type="button" data-clear-board>Clear</button>
          </div>
          <ol data-leaderboard-list></ol>
        </section>

        <p class="help">Use arrow keys or WASD. Press Space or P to pause. Press Enter to restart after game over. Share the invite link so friends join the same battle room.</p>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
